{% extends 'base.html' %}
{% block title %}Flag Session{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-1">Flag session</h5>
        <p class="text-muted small mb-4">
          {{ session.student.get_full_name }} — {{ session.exam.title }}
        </p>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Reason for flagging</label>
            <textarea name="reason" class="form-control" rows="3"
              placeholder="Describe the suspicious behaviour..."></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">Flag session</button>
            <a href="{% url 'invigilator:session_logs' session.id %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
