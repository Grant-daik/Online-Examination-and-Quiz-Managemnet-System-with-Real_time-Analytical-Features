{% extends 'base.html' %}
{% block title %}Assign Invigilator{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4 class="fw-bold mb-1">Assign invigilators</h4>
    <p class="text-muted small mb-4">{{ exam.title }} — {{ exam.course.code }}</p>

    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label fw-500">Select invigilators</label>
            {{ form.invigilators }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Save assignment</button>
            <a href="{% url 'admin_portal:exam_oversight' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
