{% extends 'base.html' %}

{% block title %}Login — Exam System{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-1 fw-bold">Sign in</h4>
        <p class="text-muted mb-4 small">Enter your email and password to continue</p>

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Email address</label>
            {{ form.username }}
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            {{ form.password }}
          </div>
          <button type="submit" class="btn btn-dark w-100">Sign in</button>
        </form>

        <hr/>
        <p class="text-center small mb-0">
          Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
